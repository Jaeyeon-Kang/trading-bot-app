version: '3.8'

services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      bash -c "pip install fastapi uvicorn pandas numpy &&
               python main.py"
    environment:
      - PYTHONPATH=/app

  frontend:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: >
      sh -c "npm install &&
             npm run dev"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000